<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
    <script src="utilitarios.js"></script>
    <script src="ventas.js"></script>
</head>
<body>

    <div class="contenedor">
        <h1>Cálculo de Ventas</h1>

        <div class="formulario">
            <label for="txtSueldoBase">Salario Base</label>
            <input type="number" id="txtSueldoBase" placeholder="0.00" onblur="validarCampo('txtSueldoBase', 'errSueldo');">
            <span id="errSueldo" class="error-mensaje"></span>

            <label for="txtVentas">Número de ventas</label>
            <input type="number" id="txtVentas" placeholder="Ej. 10" onblur="validarVentasFull();">
            <span id="errVentas" class="error-mensaje"></span>

            <label for="txtPrecio">Precio del producto</label>
            <input type="number" id="txtPrecio" placeholder="0.00" onblur="validarCampo('txtPrecio', 'errPrecio');">
            <span id="errPrecio" class="error-mensaje"></span>

            <button onclick="calcular();">Calcular Comisión</button>
        </div>

        <div class="resultados">
            <h2>Resumen</h2>
            <div class="resultado-item">
                <p>Salario Base:</p>
                <span id="spSueldoBase">$0.00</span>
            </div>
            <div class="resultado-item">
                <p>Comisión:</p>
                <span id="spComision">$0.00</span>
            </div>
            <div class="resultado-item">
                <p>Total a Recibir:</p>
                <span id="spTotal">$0.00</span>
            </div>
        </div>
    </div>
    
</body>
</html>
